project_id = "mrl-mileage-management"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 17

[studio]
enabled = true
port = 54323

[auth]
enabled = true
site_url = "https://gestao-mrltravel.vercel.app"
additional_redirect_urls = ["https://gestao-mrltravel.vercel.app/**", "http://localhost:5173/**"]
enable_signup = false

[auth.email]
enable_confirmations = true
max_frequency = "1m"
otp_length = 8

[auth.mfa.totp]
enroll_enabled = true
verify_enabled = true

[storage.vector]
enabled = false

[functions.request-client-access]
verify_jwt = false

[functions.verify-client-access]
verify_jwt = false

[functions.admin-create-client]
verify_jwt = true

[functions.get-client-dashboard-by-link]
verify_jwt = false
